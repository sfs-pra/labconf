name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build valac libgtk-3-dev libxml2-dev

      - name: Setup Meson
        run: |
          meson setup build --prefix=/usr -Db_lto=true

      - name: Build
        run: |
          ninja -C build

      - name: Run tests
        run: |
          meson test -C build --print-errorlogs || true